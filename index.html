<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maroo Love World</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="hearts-container" id="hearts-container"></div>

    <div class="main-card">
        <div class="profile-img">
            <img src="your-photo.jpg" alt="Maroo"> </div>
        <h1>عالم ماروو الرومانسي</h1>
        <p>مرحباً بك في عالمي الخاص.. حيث تدق الألحان</p>
        
        <div class="player-wrapper">
            <div class="song-info">جاري التشغيل الآن... 🎵</div>
            <audio id="main-audio" loop>
                <source src="music.mp3" type="audio/mpeg">
            </audio>
            <button id="play-btn" class="control-btn">دخول العالم ❤️</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
