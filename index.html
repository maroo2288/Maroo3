<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مكتبتي الموسيقية</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 50px;
        }
        .player-container {
            background: #1e1e1e;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            width: 300px;
            text-align: center;
        }
        audio {
            width: 100%;
            margin-top: 20px;
        }
        .song-title {
            margin-bottom: 10px;
            font-size: 1.2rem;
            color: #1db954; /* لون أخضر جذاب */
        }
    </style>
</head>
<body>

    <h2>مشغل الموسيقى الخاص بي</h2>

    <div class="player-container">
        <div class="song-title">اسم الأغنية هنا</div>
        <audio controls>
            <source src="song1.mp3" type="audio/mpeg">
            متصفحك لا يدعم تشغيل الصوت.
        </audio>
    </div>

</body>
</html>
