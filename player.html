<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>حكايتنا - ماروو & ريمو</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="overlay-glow"></div>
    <div id="hearts-container"></div>

    <div class="countdown-timer">
        <div class="countdown-title">ده تاريخ اعترافك ليا ❤️</div>
        <div class="timer-display">
            <span id="days">00</span><span class="timer-unit">يوم</span>
            <span id="hours">00</span><span class="timer-unit">ساعة</span>
            <span id="minutes">00</span><span class="timer-unit">دقيقة</span>
            <span id="seconds">00</span><span class="timer-unit">ثانية</span>
        </div>
    </div>

    <div class="main-container" id="story-container">
        </div>

    <div class="audio-controls">
        <audio id="main-audio" loop><source src="song1.mp3" type="audio/mpeg"></audio>
        <button id="play-pause-btn" class="control-btn">كتم الصوت 🔇</button>
    </div>

    <script>
        // لستة بأسماء الملفات اللي عندك على جيت هاب (بدون الامتداد) والوصف بتاعها
        const photoData = [
            { id: "12ee8dbafdb34855d88ec82ab043a694", text: "في الملامح دي، بشوف الهدوء اللي بيطمن قلبي." },
            { id: "16d16cfd0d48eef44d1213f0f8a3e439", text: "كأننا في عالم لوحدنا، مفيش فيه غير صوت أرواحنا." },
            { id: "23c0b2fa3ab6f63cda138e078316b1a8", text: "كل خطوة سوا بتأكد لي إن المشوار بيكي أجمل." },
            { id: "32e702df6dd256bf9d15d589b14195c1", text: "في تفاصيلك، بلاقي الأمان اللي كنت بدور عليه." },
            { id: "343244725c6f6a1c52e2239e0da4084b", text: "إنتي الضحكة اللي بتطلع من القلب، والنور في طريقي." },
            { id: "78106ee2144a188caa540703a13973d0", text: "بين السطور واللحظات، دايماً إنتي البطلة الوحيدة." },
            { id: "7b9c90bac1ed97426b342427ba5d9dd5", text: "وجودك جنبي هو السند اللي بيخليني أقوى." },
            { id: "8c80045687e8a45c9ed348359defe91d", text: "معاكي، حتى السكوت بيبقى له معنى أجمل." },
            { id: "a18ef28f2287592fdabc2ac4220127fa", text: "إنتي مش بس شريكة طريقي، إنتي كل دنيتي." },
            { id: "fc3e2ef4c33348dbaeff8796e5a36e59", text: "وعهد عليا، نفضل سوا لآخر العمر في حكاية مابتخلصش." }
        ];

        const container = document.getElementById('story-container');

        photoData.forEach(item => {
            const card = document.createElement('div');
            card.className = 'story-card';

            const img = document.createElement('img');
            img.className = 'story-img';
            
            // مصفوفة الامتدادات المحتملة
            const exts = ['.jpeg', '.jpg', '.JPG', '.JPEG', '.png'];
            let currentExtIndex = 0;

            img.onerror = function() {
                if (currentExtIndex < exts.length) {
                    this.src = item.id + exts[currentExtIndex];
                    currentExtIndex++;
                }
            };

            // يبدأ بمحاولة تحميل أول امتداد
            img.src = item.id + exts[0];

            card.innerHTML = `<p class="story-text">${item.text}</p>`;
            card.prepend(img);
            container.appendChild(card);
        });
    </script>
    <script src="script.js"></script>
</body>
</html>
