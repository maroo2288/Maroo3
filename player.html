<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>عالم الموسيقى - ماروو</title>
    <link rel="stylesheet" href="style.css">
</head>
<body onload="startEverything()">

    <div class="hearts-container" id="hearts-container"></div>

    <div class="main-card">
        <div class="profile-img">
            <img src="me.jpg" alt="Maroo"> </div>
        <h1>أهلاً بك في عالمي</h1>
        <p>استمتع باللحن الخاص..</p>
        
        <audio id="main-audio" loop autoplay>
            <source src="song1.mp3" type="audio/mpeg">
        </audio>
    </div>

    <script src="script.js"></script>
    <script>
        function startEverything() {
            const audio = document.getElementById('main-audio');
            audio.play().catch(() => {
                console.log("المتصفح منع التشغيل التلقائي، جاري المحاولة مرة أخرى عند التفاعل.");
            });
        }
    </script>
</body>
</html>
