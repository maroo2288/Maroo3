<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>حكايتنا - ماروو & ريمو</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="overlay-glow"></div>
    <div id="hearts-container"></div>

    <div class="countdown-timer">
        <div class="countdown-title">ده تاريخ اعترافك ليا ❤️</div>
        <div class="timer-display">
            <span id="days">00</span><span class="timer-unit">يوم</span>
            <span id="hours">00</span><span class="timer-unit">ساعة</span>
            <span id="minutes">00</span><span class="timer-unit">دقيقة</span>
            <span id="seconds">00</span><span class="timer-unit">ثانية</span>
        </div>
    </div>

    <div class="main-container" id="dynamic-gallery">
        </div>

    <div class="audio-controls">
        <audio id="main-audio" loop><source src="song1.mp3" type="audio/mpeg"></audio>
        <button id="play-pause-btn" class="control-btn">كتم الصوت 🔇</button>
    </div>

    <script>
        // إعدادات الوصول للفولدر بتاعك
        const username = 'maroo2288';
        const repo = 'Maroo3';
        const galleryContainer = document.getElementById('dynamic-gallery');

        // جمل وصف عشوائية عميقة عشان تليق على أي صورة
        const randomTexts = [
            "في اللحظة دي، كأن العالم كله سكت عشان يحس بينا.",
            "كل ملامح بيكي هي أمان لقلبي.",
            "سند وراحة ملهومش حدود في قربك.",
            "إنتي الضي اللي بينور عتمة أيامي.",
            "مش مجرد صورة، دي روحين لقوا بعض وسط الزحمة.",
            "معاكي السكوت بيبقى له طعم الرضا.",
            "ضحكتك هي النور اللي بيفتح طريقي.",
            "إنتي الهدية اللي ربنا بعتها ليا."
        ];

        async function loadImages() {
            try {
                // بنطلب من GitHub يدينا لستة بكل الملفات اللي في المستودع
                const response = await fetch(`https://api.github.com/repos/${username}/${repo}/contents/`);
                const files = await response.json();

                // بنفلتر الملفات عشان ناخد الصور بس (jpg, jpeg, png, gif)
                const imageFiles = files.filter(file => 
                    file.name.match(/\.(jpg|jpeg|png|gif)$/i)
                );

                imageFiles.forEach((file, index) => {
                    const card = document.createElement('div');
                    card.className = 'story-card';

                    const img = document.createElement('img');
                    img.className = 'story-img';
                    img.src = file.download_url; // بيجيب رابط الصورة المباشر أياً كان اسمها

                    const text = document.createElement('p');
                    text.className = 'story-text';
                    // بيختار جملة وصف بالترتيب أو عشوائي
                    text.innerHTML = randomTexts[index % randomTexts.length];

                    card.appendChild(img);
                    card.appendChild(text);
                    galleryContainer.appendChild(card);
                });
            } catch (error) {
                console.error("خطأ في تحميل الصور:", error);
            }
        }

        loadImages();
    </script>
    <script src="script.js"></script>
</body>
</html>
