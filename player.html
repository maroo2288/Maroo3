<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>حكايتنا - ماروو & ريمو</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="overlay-glow"></div>
    <div id="hearts-container"></div>

    <div class="countdown-timer">
        <div class="countdown-title">ده تاريخ اعترافك ليا ❤️</div>
        <div class="timer-display">
            <span id="days">00</span><span class="timer-unit">يوم</span>
            <span id="hours">00</span><span class="timer-unit">ساعة</span>
            <span id="minutes">00</span><span class="timer-unit">دقيقة</span>
            <span id="seconds">00</span><span class="timer-unit">ثانية</span>
        </div>
    </div>

    <div class="main-container">
        <div class="story-card">
            <img src="1000274434.jpg" class="story-img">
            <p class="story-text">في اللحظة دي، كأن العالم كله سكت عشان يدينا مساحة نحس بـ <span class="highlight-text">الأمان</span> اللي ملوش نهاية.</p>
        </div>

        <div class="story-card">
            <img src="1000274429.jpg" class="story-img">
            <p class="story-text">ملامحنا في الكادر ده بتقول كلام كتير عجزنا نوصفه، كأنها <span class="highlight-text">بصمة</span> لذكرى مش هتتكرر.</p>
        </div>

        <div class="story-card" style="display: none;">
            <img src="" class="story-img">
            <p class="story-text"></p>
        </div>
    </div>

    <div class="audio-controls">
        <audio id="main-audio" loop>
            <source src="song1.mp3" type="audio/mpeg">
        </audio>
        <button id="play-pause-btn" class="control-btn">كتم الصوت 🔇</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
